<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard — Rekening Validator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #02040a;
    --s1: rgba(13, 17, 23, 0.88);
    --s2: rgba(20, 26, 38, 0.95);
    --b: rgba(0, 229, 255, 0.12);
    --bh: rgba(0, 229, 255, 0.32);
    --c: #00e5ff;
    --c2: #7c3aed;
    --g: #00ffa3;
    --r: #ff4d6d;
    --y: #fbbf24;
    --t: #e2e8f0;
    --m: #64748b;
    --fn: 'Syne', sans-serif;
    --fd: 'Orbitron', sans-serif;
    --fm: 'JetBrains Mono', monospace;
    --rad: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--t);
    font-family: var(--fn);
    min-height: 100vh;
    overflow-x: hidden;
}

#cvs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.wrap {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 14px;
}

.brand {
    font-family: var(--fd);
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--c));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.brand-sub {
    font-family: var(--fm);
    color: var(--m);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 3px;
    text-transform: uppercase;
}

.card {
    background: var(--s1);
    backdrop-filter: blur(14px) saturate(150%);
    border: 1px solid var(--b);
    border-radius: var(--rad);
    padding: 30px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
}

.card::after {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--c), transparent);
    opacity: 0.2;
}

.ctitle {
    font-family: var(--fd);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--c);
    text-transform: uppercase;
    margin-bottom: 20px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
}

.stat-box {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--b);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
}

.stat-num {
    font-family: var(--fm);
    font-size: 32px;
    font-weight: 700;
    color: var(--g);
    margin-bottom: 4px;
}

.stat-lbl {
    font-family: var(--fm);
    font-size: 10px;
    color: var(--m);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.input-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

input {
    background: rgba(0,0,0,0.3);
    border: 1.5px solid var(--b);
    border-radius: 10px;
    color: #fff;
    font-family: var(--fm);
    padding: 12px 16px;
    outline: none;
    transition: 0.25s;
}

input:focus { border-color: var(--c); }

.f-grow { flex: 1; min-width: 200px; }
.f-small { width: 120px; }

.btn {
    font-family: var(--fd);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.22s;
    white-space: nowrap;
}

.btn-c { background: var(--c); color: #000; }
.btn-c:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-2px); }

.btn-r { background: rgba(255, 77, 109, 0.1); color: var(--r); border: 1px solid rgba(255, 77, 109, 0.2); }
.btn-r:hover { background: var(--r); color: #000; }

.btn-ghost { background: transparent; border: 1px solid var(--b); color: var(--t); }
.btn-ghost:hover { border-color: var(--c); color: var(--c); }

.btn-logout { background: rgba(255,255,255,0.05); color: var(--m); }
.btn-logout:hover { color: var(--r); border-color: var(--r); }

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}

th {
    padding: 12px 15px;
    font-family: var(--fm);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--c);
    text-align: left;
    border-bottom: 1px solid var(--b);
}

td {
    padding: 16px 15px;
    font-family: var(--fm);
    font-size: 13px;
    color: #94a3b8;
    border-bottom: 1px solid rgba(30, 45, 69, 0.35);
}

.code-cell { color: #fff; font-weight: 600; letter-spacing: 1px; }
.quota-cell { font-weight: 700; font-size: 16px; }

.status-tag {
    display: inline-flex;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
}

.tag-active { background: rgba(0, 255, 163, 0.1); color: var(--g); border: 1px solid rgba(0, 255, 163, 0.2); }
.tag-empty { background: rgba(255, 77, 109, 0.1); color: var(--r); border: 1px solid rgba(255, 77, 109, 0.2); }

.action-cell { display: flex; gap: 8px; align-items: center; }

.msg {
    margin-top: 15px;
    font-family: var(--fm);
    font-size: 12px;
    min-height: 18px;
}

.msg.ok { color: var(--g); }
.msg.er { color: var(--r); }

.tw { overflow-x: auto; border-radius: 12px; }

</style>
</head>
<body>
<canvas id="cvs"></canvas>

<div class="wrap">
    <div class="topbar">
        <div>
            <div class="brand">ADMIN PORTAL</div>
            <div class="brand-sub">// license & access manager</div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-ghost" onclick="loadAll()">↻ Refresh</button>
            <a href="/admin/logout" class="btn btn-logout" style="text-decoration:none">Log Out</a>
        </div>
    </div>

    <div class="card">
        <div class="ctitle">System Statistics</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-num" id="sTotal">0</div>
                <div class="stat-lbl">Total Codes</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="sActive" style="color:var(--c)">0</div>
                <div class="stat-lbl">Active Codes</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="sQuota" style="color:var(--y)">0</div>
                <div class="stat-lbl">Total Quota Remaining</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="ctitle">➕ Register New Code</div>
        <div class="input-row">
            <input type="text" id="inCode" class="f-grow" placeholder="MANZ-VIP-XXX" autocomplete="off">
            <input type="number" id="inQuota" class="f-small" value="100" min="1">
            <button class="btn btn-c" onclick="addCode()">Create & Activate</button>
        </div>
        <div id="msg" class="msg"></div>
    </div>

    <div class="card">
        <div class="ctitle">📋 Active Verification Codes</div>
        <div class="tw">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>License Code</th>
                        <th>Quota</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="5" style="text-align:center; padding:40px; color:var(--m)">Scanning database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
(function(){
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    let S = [], mouse = {x: -1000, y: -1000, active: false};

    function init() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        S = Array.from({length: 120}, () => ({
            x: Math.random() * cvs.width,
            y: Math.random() * cvs.height,
            r: Math.random() * 1.5 + 0.4,
            v: Math.random() * 0.2 + 0.1,
            a: Math.random() * Math.PI * 2
        }));
    }

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        if(mouse.active) {
            const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 160);
            grad.addColorStop(0, 'rgba(0, 229, 255, 0.12)');
            grad.addColorStop(0.6, 'rgba(124, 58, 237, 0.05)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 160, 0, Math.PI*2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 2, 0, Math.PI*2);
            ctx.fillStyle = '#00e5ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00e5ff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        S.forEach(s => {
            let dx = mouse.x - s.x;
            let dy = mouse.y - s.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < 220 && mouse.active) {
                let force = (220 - dist) / 220;
                s.x += dx * force * 0.04;
                s.y += dy * force * 0.04;
            }

            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 229, 255, ${0.2 + s.r * 0.2})`;
            ctx.fill();

            s.y += s.v;
            s.x += Math.sin(s.a) * 0.1;
            s.a += 0.01;

            if (s.y > cvs.height) { s.y = -10; s.x = Math.random() * cvs.width; }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
    });
    window.addEventListener('mouseleave', () => { mouse.active = false; });
    window.addEventListener('resize', init);
    init(); draw();
})();

async function loadAll() {
    const res = await fetch('/admin/list');
    const d = await res.json();
    if(!d.ok) return;

    document.getElementById('sTotal').textContent = d.total;
    document.getElementById('sActive').textContent = d.active;
    document.getElementById('sQuota').textContent = (d.total_quota || 0).toLocaleString();

    const tb = document.getElementById('tbody');
    if(!d.codes.length) {
        tb.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--m)">No codes found.</td></tr>';
        return;
    }

    tb.innerHTML = d.codes.map((c, i) => `
        <tr>
            <td style="color:var(--m)">${i+1}</td>
            <td class="code-cell">${c.code}</td>
            <td class="quota-cell" style="color:${c.quota > 0 ? 'var(--g)' : 'var(--r)'}">${c.quota.toLocaleString()}</td>
            <td><span class="status-tag ${c.quota > 0 ? 'tag-active' : 'tag-empty'}">${c.quota > 0 ? 'ACTIVE' : 'EXHAUSTED'}</span></td>
            <td>
                <div class="action-cell">
                    <input type="number" id="q_${c.code}" value="${c.quota}" min="0" style="width:80px; padding:6px 10px; font-size:12px">
                    <button class="btn btn-ghost" style="padding:6px 12px" onclick="setQ('${c.code}')">Set</button>
                    <button class="btn btn-r" style="padding:6px 12px" onclick="del('${c.code}')">Delete</button>
                </div>
            </td>
        </tr>
    `).join('');
}

async function addCode() {
    const code = document.getElementById('inCode').value.trim().toUpperCase();
    const quota = parseInt(document.getElementById('inQuota').value);
    const msg = document.getElementById('msg');

    if(!code) return showMsg('Code required', true);

    const res = await fetch('/admin/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, quota })
    });
    const d = await res.json();
    if(d.ok) {
        showMsg(`✓ Code ${d.code} added successfully`, false);
        document.getElementById('inCode').value = '';
        loadAll();
    } else {
        showMsg(`✗ ${d.msg}`, true);
    }
}

async function setQ(code) {
    const quota = parseInt(document.getElementById('q_'+code).value);
    const res = await fetch('/admin/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, quota })
    });
    const d = await res.json();
    if(d.ok) {
        showMsg(`✓ ${code} updated to ${quota}`, false);
        loadAll();
    }
}

async function del(code) {
    if(!confirm(`Permanently delete code ${code}?`)) return;
    const res = await fetch('/admin/delete', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
    });
    const d = await res.json();
    if(d.ok) {
        showMsg(`✓ ${code} removed`, false);
        loadAll();
    }
}

function showMsg(t, isErr) {
    const m = document.getElementById('msg');
    m.textContent = t;
    m.className = 'msg ' + (isErr ? 'er' : 'ok');
    setTimeout(() => m.textContent = '', 5000);
}

loadAll();
</script>
</body>
</html>
