<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Validasi Rekening</title>

<style>
body{
  background:#0f172a;
  color:#e2e8f0;
  font-family:sans-serif;
  padding:40px;
  text-align:center;
}

.box{
  border:2px dashed #334155;
  padding:30px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

button{
  padding:10px 20px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  margin:5px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.match{color:#4ade80}
.salah{color:#f87171}
</style>
</head>

<body>

<h2>Validasi Rekening Bank</h2>

<div class="box" onclick="fileInput.click()">
  Klik / Drag Excel
</div>

<input type="file" id="fileInput" hidden>

<p id="fileName"></p>

<button onclick="start()">Proses</button>
<button onclick="downloadTemplate()">Download Template</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Rekening</th>
<th>Bank</th>
<th>Nama Bank</th>
<th>Hasil</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="downloadCSV()">Download Hasil</button>

<script>
let file = null;
let results = [];

const fileInput = document.getElementById('fileInput');
const tbody = document.getElementById('tbody');

fileInput.onchange = () => {
  file = fileInput.files[0];
  document.getElementById('fileName').innerText = file.name;
};

// 🔥 START PROCESS (REALTIME)
async function start(){
  if(!file) return alert("Pilih file dulu");

  tbody.innerHTML = '';   // FIX DUPLIKAT
  results = [];

  const fd = new FormData();
  fd.append('file', file);

  const res = await fetch('/stream', {
    method:'POST',
    body:fd
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let buffer = '';

  while(true){
    const {value,done} = await reader.read();
    if(done) break;

    buffer += decoder.decode(value,{stream:true});
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for(const line of lines){
      if(!line.startsWith('data:')) continue;

      const data = JSON.parse(line.replace('data:','').trim());

      if(data.type === 'result'){
        addRow(data);
        results.push(data);
      }
    }
  }
}

// 🔥 ADD ROW (REALTIME)
function addRow(d){
  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>${d.index}</td>
    <td>${d.nama}</td>
    <td>${d.rekening}</td>
    <td>${d.bank}</td>
    <td>${d.nama_bank}</td>
    <td class="${d.hasil==='MATCH'?'match':'salah'}">${d.hasil}</td>
  `;

  tbody.appendChild(tr);
}

// 🔥 DOWNLOAD TEMPLATE
function downloadTemplate(){
  const csv = "nama,rekening,bank\nWAHYU NUR IMAN,1330024362634,MANDIRI";
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "template.csv";
  a.click();
}

// 🔥 DOWNLOAD HASIL
function downloadCSV(){
  if(results.length === 0) return;

  let csv = "No,Nama,Rekening,Bank,Nama Bank,Hasil\n";

  results.forEach(r=>{
    csv += `${r.index},${r.nama},${r.rekening},${r.bank},${r.nama_bank},${r.hasil}\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "hasil.csv";
  a.click();
}
</script>

</body>
</html>
