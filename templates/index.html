<!DOCTYPE html>
<html>
<head>
    <title>Validasi Rekening</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>

<main class="container">
    <h2>⚡ Validasi Rekening Bank</h2>

    <input type="file" id="file">
    <button onclick="start()">Proses</button>
    <a href="/template">Download Template</a>

    <table>
        <thead>
            <tr>
                <th>No</th><th>Nama</th><th>Rekening</th><th>Bank</th><th>Nama Bank</th><th>Hasil</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <button onclick="download('xlsx')">Download XLSX</button>
    <button onclick="download('csv')">Download CSV</button>
</main>

<script src="/static/script.js"></script>
</body>
</html>
