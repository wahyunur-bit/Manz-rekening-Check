<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Validation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="font-sans bg-gray-100">

    <div class="container mx-auto p-6">
        <h1 class="text-2xl font-bold mb-4">Bank Validation Tool</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Upload Excel File:</label>
            <input type="file" id="fileInput" accept=".xlsx" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
        </div>
        
        <button id="uploadBtn" class="mb-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-500">Validate</button>
        <button id="templateBtn" class="mb-4 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-500">Download Template</button>
        
        <div id="results" class="mt-4 border border-gray-300 rounded-md p-4 bg-white overflow-auto max-h-60">
            <h2 class="font-semibold">Results:</h2>
            <pre id="resultsOutput" class="text-sm text-gray-700"></pre>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const socket = io(); // Connect to the Socket.IO server

            socket.on('result', function(data) {
                const output = `No: ${data.index}, Nama: ${data.nama}, Rekening: ${data.rekening}, Bank: ${data.bank}, Nama Bank: ${data.nama_bank}, Hasil: ${data.hasil}\n`;
                $("#resultsOutput").append(output); // Update results in real-time
                $("#results").scrollTop($("#results")[0].scrollHeight); // Auto-scroll
            });

            socket.on('done', function(data) {
                alert("Processing complete! Total: " + data.total);
            });

            $("#uploadBtn").on("click", function() {
                const file = $("#fileInput").prop("files")[0];
                if (!file) {
                    alert("Please select a file.");
                    return;
                }
                
                const formData = new FormData();
                formData.append("file", file);

                $.ajax({
                    url: "/stream",
                    type: "POST",
                    data: formData,
                    processData: false,
                    contentType: false
                });
            });

            $("#templateBtn").on("click", function() {
                window.location.href = "/template"; // Redirect to download template
            });
        });
    </script>

</body>
</html>
